<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Background Gradient with deep space-tech feeling -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#09090b" />
      <stop offset="50%" stop-color="#18181b" />
      <stop offset="100%" stop-color="#030303" />
    </linearGradient>

    <!-- Premium Holographic Glowing Accents (Cyan-Teal to Neon Green to Lime-Yellow) -->
    <linearGradient id="neonGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00E5FF" />
      <stop offset="60%" stop-color="#00FF9D" />
      <stop offset="100%" stop-color="#A7FF3F" />
    </linearGradient>

    <!-- Real Gaussian Blur Filter to render authentic futuristic lighting effects without heavy assets -->
    <filter id="glow" id-attribute="glow-filter" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="15" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Outer Rounded Smooth Tech Frame -->
  <rect x="16" y="16" width="480" height="480" rx="96" fill="url(#bgGrad)" stroke="#27272a" stroke-width="6" />

  <!-- Concentric Orbital Ring -->
  <circle cx="256" cy="256" r="180" fill="none" stroke="url(#neonGrad)" stroke-width="4" stroke-opacity="0.25" />

  <!-- Technical Overlay Grid & Target Lines -->
  <path d="M 120 256 L 392 256 M 256 120 L 256 392" stroke="#27272a" stroke-width="2" stroke-dasharray="10 10" />

  <!-- Glowing Core Graphics Group -->
  <g filter="url(#glow)">
    <!-- Stylized structural 'A' for Adexa, merged with ascending chart lines -->
    <path d="M 148 370 L 244 148 C 249 136, 263 136, 268 148 L 364 370" fill="none" stroke="url(#neonGrad)" stroke-width="28" stroke-linecap="round" stroke-linejoin="round" />
    
    <!-- Bullying Ascent Trend Bar transitioning up and rightwards -->
    <path d="M 180 290 Q 256 312 376 230" fill="none" stroke="url(#neonGrad)" stroke-width="22" stroke-linecap="round" />
    
    <!-- Central cognitive neural network junctions -->
    <circle cx="256" cy="176" r="18" fill="#09090b" stroke="#00FF9D" stroke-width="6" />
    <circle cx="376" cy="230" r="15" fill="#09090b" stroke="#00E5FF" stroke-width="5" />
    <circle cx="180" cy="290" r="12" fill="#09090b" stroke="#A7FF3F" stroke-width="4" />
  </g>
  
  <!-- Sleek technical branding text blocks in the margins -->
  <text x="60" y="85" fill="#a1a1aa" font-family="monospace" font-weight="bold" font-size="14" letter-spacing="2">ADEXA : UNIVERSAL</text>
  <text x="345" y="445" fill="#52525b" font-family="monospace" font-size="12">NIT 901906721-1</text>
</svg>
